<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyJet Proxy</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/mercuryworkshop/scramjet-app@latest/public/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght=100..800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <form id="search">
      <input id="url" type="text" class="search-input" placeholder="Search the web or enter a URL">
    </form>
    <span id="gear"><i class="fa">&#xf013;</i></span>
  </header>
  
  <div id="overlay">
    <div id="settings">
      <h3>Settings</h3>
      <hr>
      <h4>WISP Server</h4>
      <form id="wispInput">
        <input id="websocket" type="text" placeholder="wss://gointospace.app/wisp/" value="wss://gointospace.app/wisp/">
        <button type="submit">Update WISP</button>
      </form>
      
      <h4>Transport Protocol</h4>
      <div class="radio-group">
        <label><input type="radio" name="transport" value="epoxy" checked> Epoxy (Default)</label>
        <label><input type="radio" name="transport" value="libcurl"> Libcurl</label>
      </div>

      <h4>Search Engine</h4>
      <select id="searchEnginePicker">
        <option value="brave">Brave (Default)</option>
        <option value="google">Google</option>
        <option value="bing">Bing</option>
        <option value="duckduckgo">DuckDuckGo</option>
      </select>

      <h4>System Info</h4>
      <p id="version">Loading version...</p>
    </div>
  </div>
  
  <iframe id="iframe" src=""></iframe>

  <script type="module">
    import * as BareMux from "https://cdn.jsdelivr.net/gh/AerialiteLabs/tinyjet-frontend@latest/tinyjet/index.mjs";
    
    // We import the controller class explicitly via ES modules to solve the 'prefix of undefined' error
    import { ScramjetController } from "https://cdn.jsdelivr.net/gh/AerialiteLabs/tinyjet-frontend@latest/tinyjet/scramjet.controller.js";

    // Set correct paths relative to your GitHub sub-repository path
    const scramjet = new ScramjetController({ 
      prefix: "/frontended/scramjet/",
      files: { 
        wasm: "https://cdn.jsdelivr.net/gh/AerialiteLabs/tinyjet-frontend@latest/tinyjet/wasm.wasm", 
        all: "https://cdn.jsdelivr.net/gh/AerialiteLabs/tinyjet-frontend@latest/tinyjet/scramjet.all.js", 
        sync: "https://cdn.jsdelivr.net/gh/AerialiteLabs/tinyjet-frontend@latest/tinyjet/scramjet.sync.js" 
      } 
    });
    scramjet.init();

    if ('serviceWorker' in navigator) {
      // Register with explicit repository path scoping
      navigator.serviceWorker.register("./sw.js", { scope: "/frontended/" })
        .then(() => console.log("Service Worker active under scope: /frontended/"))
        .catch(err => console.error("Service Worker failed to hook:", err));
    }

    // Direct registration pointing to your subfolder script file
    const connection = new BareMux.BareMuxConnection("/frontended/worker.js");

    const settings = document.getElementById("settings");
    const overlay = document.getElementById("overlay");
    const gear = document.getElementById("gear");

    gear.onclick = () => { overlay.classList.add("active"); settings.classList.add("open"); }
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.classList.remove("active"); settings.classList.remove("open"); } }
    document.onkeydown = (e) => { if (e.key === "Escape") { overlay.classList.remove("active"); settings.classList.remove("open"); } }

    async function setTransport(transport) {
      const wispUrl = document.getElementById("websocket").value.trim() || "wss://gointospace.app/wisp/";
      localStorage.setItem('selectedTransport', transport);
      if (transport === "libcurl") {
        await connection.setTransport("https://cdn.jsdelivr.net/npm/@mercuryworkshop/libcurl-transport/dist/index.mjs", [{ websocket: wispUrl }]);
      } else {
        await connection.setTransport("https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport/dist/index.mjs", [{ wisp: wispUrl }]);
      }
    }

    setTransport(localStorage.getItem('selectedTransport') || "epoxy");

    document.getElementById("wispInput").addEventListener("submit", async (e) => {
      e.preventDefault();
      const currentTransport = document.querySelector('input[name="transport"]:checked').value;
      await setTransport(currentTransport);
    });

    document.querySelectorAll('input[name="transport"]').forEach(radio => {
      radio.addEventListener('change', async (e) => await setTransport(e.target.value));
    });

    const searchTemplates = {
      google: "https://www.google.com/search?q=%s",
      bing: "https://www.bing.com/search?q=%s",
      duckduckgo: "https://duckduckgo.com/?q=%s",
      brave: "https://search.brave.com/search?q=%s"
    };

    function parseSearch(input) {
      try { return new URL(input).toString(); } catch (e) {}
      try {
        let url = new URL(`http://${input}`);
        if (url.hostname.includes(".")) return url.toString();
      } catch (e) {}
      
      const engine = document.getElementById('searchEnginePicker').value;
      return searchTemplates[engine].replace("%s", encodeURIComponent(input));
    }

    document.getElementById("search").addEventListener("submit", (e) => {
      e.preventDefault();
      const rawUrl = document.getElementById("url").value;
      const targetUrl = parseSearch(rawUrl);
      const encoded = scramjet.encodeUrl(targetUrl);
      
      // Clean prefix resolution prevents double '/scramjet/scramjet/' redirection drops
      document.getElementById("iframe").src = "/frontended/scramjet/" + encoded;
    });

    // Populate commit tag info cleanly
    (async function fetchVersion() {
      try {
        const resp = await fetch('https://api.github.com/repos/AerialiteLabs/tinyjet-frontend/commits?per_page=1');
        const data = await resp.json();
        const sha = Array.isArray(data) ? data[0].sha : data.sha;
        document.getElementById('version').textContent = "v-" + sha.slice(0, 7);
      } catch (err) {
        document.getElementById('version').textContent = "Production Target Ready";
      }
    })();
  </script>
</body>
</html>
